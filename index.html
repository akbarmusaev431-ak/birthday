<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: white;
    overflow-x: hidden;
}

.container {
    margin-top: 100px;
    animation: fadeIn 2s ease-in-out;
}

h1 {
    font-size: 45px;
    animation: bounce 2s infinite;
}

p {
    font-size: 20px;
    max-width: 600px;
    margin: auto;
    line-height: 1.5;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff6b81;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff6b81;
    color: white;
    transform: scale(1.1);
}

#hidden, #secondBtn, #gallery {
    display: none;
    margin-top: 20px;
    animation: fadeIn 2s ease-in-out;
}

/* Галерея */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 15px;
    transition: 0.3s;
    opacity: 0;
    transform: scale(0.8);
}

.gallery img.show {
    opacity: 1;
    transform: scale(1);
}

/* Анимации */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes bounce {
    0%, 100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}

/* Сердечки */
.heart {
    position: absolute;
    bottom: 0;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(0); opacity: 1;}
    100% {transform: translateY(-800px); opacity: 0;}
}
</style>
</head>

<body>

<div class="container">
    <h1>🎂 Tug‘ilgan kuning bilan! 🎉</h1>
    
    <p>
        Bugun oddiy kun emas… 💫 <br>
        Bugun mening eng qadrli dugonam dunyoga kelgan kun 💖
    </p>

    <button onclick="showMessage()">Bos 👀</button>

    <p id="hidden">
        Seni juda yaxshi ko‘raman 💕 <br>
        Har doim yonimda bo‘lganing uchun rahmat! 💖
    </p>

    <!-- ВТОРАЯ КНОПКА -->
    <button id="secondBtn" onclick="showGallery()">Bos meni 💖</button>
</div>

<!-- ГАЛЕРЕЯ -->
<div id="gallery" class="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
    <img src="photo4.jpg">
    <img src="photo5.jpg">
</div>

<script>
function showMessage() {
    document.getElementById("hidden").style.display = "block";
    document.getElementById("secondBtn").style.display = "inline-block";
    createHearts();
}

function showGallery() {
    let gallery = document.getElementById("gallery");
    gallery.style.display = "grid";

    let images = gallery.querySelectorAll("img");

    images.forEach((img, index) => {
        setTimeout(() => {
            img.classList.add("show");
        }, index * 300);
    });
}

function createHearts() {
    for (let i = 0; i < 20; i++) {
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.className = "heart";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }
}
</script>

</body>
</html>
